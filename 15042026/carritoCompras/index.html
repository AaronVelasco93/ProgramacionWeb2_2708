<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de compras</title>
</head>

<body>
    <div id="carrito">
        <h2>Carrito de compras</h2>
        <ul id="lista-productos">
            <!-- Aqui vamos a mostrar los productos que el usuario ha agregado al carrito de compras. Cada producto tendrá su nombre, precio y una opción para eliminarlo del carrito. -->
        </ul>
    </div>

    <!-- formulario para ingresar productos al carrito de compras -->
    <form id="formulario-producto">
        <label for="nombre-producto">Nombre del producto</label>
        <input type="text" id="nombre" placeholder="Nombre del producto" required>
        <br>
        <label for="precio-producto">Precio del producto</label>
        <input type="number" id="precio" placeholder="Precio del producto" step="0.01" required>
        <br>
        <label for="cantidad-producto">Cantidad del producto</label>
        <input type="number" id="cantidad" placeholder="Cantidad del producto" min="1" required>
        <br>
        <button type="submit">Agregar al carrito</button>
    </form>

</body>
<script src="app.js"></script>

</html>
