<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de QR</title>
</head>
<body>
    <header>
        <h1>Generador de QR</h1>
    </header>
    <div>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Ingrese su nombre" required maxlength="100">
        <br>
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="Ingrese su correo electrónico" required maxlength="100">
        <br>
        <label for="telefono">Número de Teléfono</label>
        <input type="tel" id="telefono" placeholder="Ingrese su número de teléfono" required maxlength="15">
        <br>
        <label for="institucion">Selecciona Institución</label>
            <input type="text" id="institucion" list="ListInstitucion" placeholder="Selecciona tu institución"  required>
        <datalist id="ListInstitucion">
            <option value="Instituto Tecnológico de Tijuana"> Instituto Tecnológico de Tijuana</option>
            <option value="Universidad Autónoma de Baja California"> Universidad Autónoma de Baja California</option>
            <option value="Centro de Enseñanza Técnica y Superior"> Centro de Enseñanza Técnica y Superior</option>
            <option value="Universidad Xochicalco"> Universidad Xochicalco</option>
            <option value="Universidad Iberoamericana Tijuana"> Universidad Iberoamericana Tijuana</option>
        </datalist>
        <br>
        <button onclick="generarQR()">Generar QR</button>

        <div  style="text-align: center;" id="qr">
            <!-- aqui va es estar el QR generado -->
        </div>

        </div>
    </div>

</body>
<script src="app.js"></script>
</html>
