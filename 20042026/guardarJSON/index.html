<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON con Documento</title>
</head>
<body>

    <h2>Formulario para guardar usuarios</h2>
    <form id="userForm">
        <label for="name">Nombre:</label>
        <input type="text" id="nombre" name="name" required><br><br>

        <label for="email">Correo Electrónico:</label>
        <input type="email" id="correo" name="email" required><br><br>

        <button type="submit">Guardar Usuario</button>
    </form>
    <!-- boton para descargar el archivo JSON -->
    <button id="descargarBtn">Descargar JSON</button>
    <!-- area donde se muestran los usuarios guardados -->
    <h3>Usuarios Guardados:</h3>
    <pre id="salidaJSON">
        
    </pre>

</body>
<script src="app.js"></script>
</html>
